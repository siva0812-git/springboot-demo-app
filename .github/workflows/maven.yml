# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Demo App - CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  IMAGE_NAME: demo-app
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn clean package -DskipTests=false
      
    - name: Debug target contents
      run: ls -R target

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: demo-app
        path: target/*.jar

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-app
          path: target

      - name: Verify artifact
        run: ls -R target

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $DOCKERHUB_REPO:latest .
          docker tag $DOCKERHUB_REPO:latest $DOCKERHUB_REPO:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push $DOCKERHUB_REPO:latest
          docker push $DOCKERHUB_REPO:${{ github.sha }}
          
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull $DOCKERHUB_REPO:latest
            sudo docker stop demo-app || true
            sudo docker rm demo-app || true
            sudo docker run -d -p 8080:8080 $DOCKERHUB_REPO:latest

